name: kasir_siswa
description: Aplikasi Point of Sale (POS) Desktop Modern - offline-first.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management & DI
  flutter_riverpod: ^2.5.1
  # Routing
  go_router: ^14.2.0
  # Database (Drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0
  # Security
  bcrypt: ^1.1.3
  # PDF / Print / Excel export
  pdf: ^3.11.0
  printing: ^5.13.1
  excel: ^4.0.3
  # Charts
  fl_chart: ^0.68.0
  # Desktop window
  window_manager: ^0.3.9
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  file_picker: ^8.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
